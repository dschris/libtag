version: '2.4'

services:
  libtag:
    build: .
    container_name: libtag
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/movies/test:/media
      - /mnt/user/appdata/libtag/data:/data
    environment:
      - LIBTAG_MEDIA_PATH=/media
      - LIBTAG_OLLAMA_URL=http://host.docker.internal:11434
      - LIBTAG_OLLAMA_MODEL=llama3.1:8b
      - LIBTAG_DB_PATH=/data/libtag.db
      - LIBTAG_AUTO_MODE=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
