<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibTag — {% block title %}Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <div class="logo">L</div>
                <div>
                    <h1>LibTag</h1>
                    <span>Media Agent</span>
                </div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}"><span class="icon">📊</span><span>Dashboard</span></a></li>
                <li><a href="/files" class="{% if request.url.path == '/files' %}active{% endif %}"><span class="icon">📁</span><span>Files</span></a></li>
                <li><a href="/activity" class="{% if request.url.path == '/activity' %}active{% endif %}"><span class="icon">📝</span><span>Activity</span></a></li>
                <li><a href="/duplicates" class="{% if request.url.path == '/duplicates' %}active{% endif %}"><span class="icon">🔁</span><span>Duplicates</span></a></li>
                <li><a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}"><span class="icon">⚙️</span><span>Settings</span></a></li>
            </ul>
        </nav>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
